<body class = "body-background">
  <mat-card class = "spotify-main-card">
    <mat-card-header class = "spotify-header">
      <mat-card-title class = "spotify-title">
        <h2>
          Spotify Artist Explorer
        </h2>

      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <p>
        Witaj w aplikacji Spotify Artist Explorer! Znajdziesz tu informacje o swoim ulubionym artyście i przesłuchasz fragmentów jego największych hitów.<br>
        Życzę miłej zabawy!<br>
        Aby kontynuować, kliknij ikonę Spotify i zaloguj się.
      </p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color = "primary" (click) = "onAuthClick()">
        Zaloguj się przez Spotify
      </button>
    </mat-card-actions>
  </mat-card>  
</body>
