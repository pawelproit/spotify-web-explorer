<app-toolbar
  [userInfo]="userInfo"
  [(searchQuery)]="searchQuery"
  (searchArtist)="onSearchArtist($event)"
  (logout)="onLogout()"
></app-toolbar>


<div class="main-content">
  <div class="search-layout">
    <ng-container *ngIf="(artists$ | async) as artists">
      <div *ngIf="artists.length === 0 && (selectedArtist$ | async) === null && userInfo" class="welcome-message">
        <h2>Witaj, wpisz nazwę artysty i zacznij eksplorować świat Spotify :)</h2>
      </div>
      <mat-card class="search" *ngIf="artists.length > 0 && (selectedArtist$ | async) === null">
        <mat-card-title>Wyniki wyszukiwania</mat-card-title>
        <mat-card-content>
          <mat-list>
            <mat-list-item *ngFor="let a of artists" (click)="onSelectArtist(a)" class="artist-item">
              <img *ngIf="a.images?.length" [src]="a.images[0].url" width="40" />
              <span class="artist-name">{{ a.name }}</span>
            </mat-list-item>
          </mat-list>
          <div *ngIf="(searchError$ | async) as error" class="error" style="margin-top: 8px;">
            {{ error }}
          </div>
        </mat-card-content>
      </mat-card>
    </ng-container>

    <mat-card *ngIf="(selectedArtist$ | async) as selectedArtist" class="artist-details">
      <button mat-stroked-button color="primary" (click)="onSelectArtist(null)" class="back-button">
        <mat-icon>arrow_back</mat-icon> Powrót do listy
      </button>
      <mat-card-title>
        {{ selectedArtist.name }}
      </mat-card-title>
      <mat-card-content>
        <p>
          <strong>Gatunki:</strong>
          <ng-container *ngIf="selectedArtist.genres?.length; else brakGatunkow">
            {{ selectedArtist.genres.join(', ') }}
          </ng-container>
          <ng-template #brakGatunkow>Brak danych</ng-template>
        </p>
        <p><strong>Followers:</strong> {{ selectedArtist.followers.total }}</p>
        <img *ngIf="selectedArtist.images?.length" [src]="selectedArtist.images[0].url" width="200" />
        <p>
          <strong>Profil Spotify:</strong>
          <a mat-stroked-button color="primary" [href]="selectedArtist.external_urls.spotify" target="_blank">
            <mat-icon>open_in_new</mat-icon> Otwórz
          </a>
        </p>
      </mat-card-content>
    </mat-card>
  </div>
</div>
